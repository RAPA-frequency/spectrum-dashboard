name: Global Spectrum Dashboard Automated Crawler

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 체크아웃
        uses: actions/checkout@v4.1.7 # 최신 패치 버전으로 상향

      - name: 2. 파이썬 환경 설정 (Python 3.10)
        uses: actions/setup-python@v5.1.1 # 최신 패치 버전으로 상향
        with:
          python-version: '3.10'

      - name: 3. 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      - name: 4. FCC 신규 데이터 수집
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd FCC
          python fcc.py
          cd ..

      - name: 5. PolicyTracker 신규 데이터 수집
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd PolicyTracker
          python policy_scraper.py
          cd ..

      - name: 6. 통합 마스터 빌드 스크립트 가동
        run: |
          python build_dashboard.py

      - name: 7. 업데이트된 데이터 및 메인 대시보드 커밋/푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add FCC/fcc_data.json FCC/fcc.html || echo "FCC 파일 없음"
          git add PolicyTracker/policy_db.json PolicyTracker/policy.html || echo "PT 파일 없음"
          git add index.html
          
          git commit -m "🤖 [자동화] 데이터 수집 및 대시보드 통합 빌드 완료 ($(date +'%Y-%m-%d'))" || echo "변경된 파일이 없습니다."
          git push
