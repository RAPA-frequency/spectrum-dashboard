name: FCC Daily Crawler

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 기준 0시)에 자동 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # GitHub 웹사이트에서 수동으로 버튼을 눌러 실행할 수 있게 함

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 변경된 파일을 커밋하고 푸시할 수 있는 권한

    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install selenium beautifulsoup4 openai webdriver-manager

      - name: 크롤러 스크립트 실행
        env:
          # GitHub Secrets에 등록한 API 키를 불러와서 환경 변수로 주입합니다.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py

      - name: 변경된 대시보드 및 JSON 파일 자동 커밋 & 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fcc_data.json index.html
          git commit -m "Automated update: FCC Data & Dashboard [$(date +'%Y-%m-%d')]" || echo "업데이트된 새 기사가 없습니다."
          git push
