name: Global Spectrum Dashboard Automated Crawler

on:
  schedule:
    # 매일 한국 시간(KST) 오전 8시(UTC 23시)에 자동으로 실행
    - cron: '0 23 * * *'
  workflow_dispatch: # 언제든 수동 실행 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9' 
          
      - name: 3. Install dependencies
        run: |
          pip install requests beautifulsoup4 openai lxml selenium webdriver-manager

      - name: 4. Run FCC Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd FCC
          python fcc.py
          cd ..

      - name: 5. Run PolicyTracker Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd PolicyTracker
          python policy_scraper.py
          cd ..

      - name: 6. Run Master Dashboard Builder
        run: |
          python build_dashboard.py

      - name: 7. Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [자동화] 데이터 수집 및 대시보드 통합 빌드 완료"
