name: Global Spectrum Dashboard Automated Crawler

on:
  schedule:
    # 매일 한국 시간(KST) 오전 8시(UTC 23시)에 자동으로 실행되도록 설정
    - cron: '0 23 * * *'
  workflow_dispatch: # 깃허브 웹에서 [Run workflow] 버튼으로 언제든 수동 실행 가능

jobs:
  crawl_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 체크아웃
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 설정 (Python 3.10)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 패키지 캐싱으로 실행 속도 향상

      - name: 3. 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openai

      - name: 4. FCC 신규 데이터 수집 및 개별 파일 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd FCC
          python fcc.py
          cd ..

      - name: 5. PolicyTracker 신규 데이터 수집 및 개별 파일 생성
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd PolicyTracker
          python policy_scraper.py
          cd ..

      # 💡 향후 영국(Ofcom), 중국, 일본 크롤러가 추가되면 이 자리에 스텝을 늘려주면 됩니다.
      # - name: 6. Ofcom 신규 데이터 수집 (추가 예정)
      #   run: |
      #     cd Ofcom && python ofcom_scraper.py && cd ..

      - name: 7. 통합 마스터 빌드 스크립트 가동 (최종 index.html 조립)
        run: |
          python build_dashboard.py

      - name: 8. 업데이트된 데이터 및 메인 대시보드 커밋/푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 변경되거나 새롭게 생성된 파일들을 깃허브 스테이지에 추가
          git add FCC/fcc_data.json FCC/fcc.html
          git add PolicyTracker/policy_db.json PolicyTracker/policy.html
          git add index.html
          
          # 변경 사항이 있을 때만 커밋 및 푸시 수행 (에러 방지)
          git commit -m "🤖 [자동화] 데이터 수집 및 대시보드 통합 빌드 완료 ($(date +'%Y-%m-%d'))" || echo "변경된 파일이 없습니다."
          git push
